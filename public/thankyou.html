<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpudBros Express — Thank You</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #D30909;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 48px 28px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    }

    .logo {
      width: 100px;
      height: auto;
      margin-bottom: 24px;
    }

    .tick {
      width: 64px;
      height: 64px;
      background-color: #FFB636;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .tick svg {
      width: 32px;
      height: 32px;
      stroke: #ffffff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: Impact, 'Arial Narrow', 'Franklin Gothic Medium', sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 15px;
      color: #888;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo.png" alt="SpudBros Express" class="logo" />
    <div class="tick">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Thank you</h1>
    <p class="subtitle">Your feedback goes straight to our team. We'll use it to do better.</p>
  </div>
</body>
</html>
