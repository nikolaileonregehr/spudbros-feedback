<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpudBros Express — Thank You</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9f6f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .brand {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #b07d3a;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🙏</div>
    <div class="brand">SpudBros Express</div>
    <h1>Thank you for your feedback</h1>
    <p class="subtitle">We really appreciate you taking the time to share your thoughts. Our team will review your feedback and use it to keep improving.</p>
    <div class="footer">SpudBros Express · See you next time</div>
  </div>
</body>
</html>
