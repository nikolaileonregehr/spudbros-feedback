<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpudBros London — Share Your Experience</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9f6f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .logo {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .brand {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #b07d3a;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      color: #666;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px 24px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 14px;
      transition: opacity 0.15s ease, transform 0.15s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .btn:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    .btn-positive {
      background-color: #2e7d32;
      color: #ffffff;
    }

    .btn-negative {
      background-color: #f5f0ea;
      color: #1a1a1a;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🥔</div>
    <div class="brand">SpudBros Express · London</div>
    <h1>How was your experience today?</h1>
    <p class="subtitle">Your feedback helps us serve you better.</p>

    <a href="https://maps.app.goo.gl/BWVyE7ktDghRXjfPA" class="btn btn-positive">
      😊 &nbsp;It was great!
    </a>

    <a href="/feedback/london" class="btn btn-negative">
      💬 &nbsp;Room for improvement
    </a>

    <div class="footer">SpudBros Express · Thank you for visiting</div>
  </div>
</body>
</html>
