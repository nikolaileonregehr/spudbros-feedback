<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpudBros Express Liverpool — Feedback</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #FFF0C3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 28px 36px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo {
      width: 48px;
      height: auto;
      flex-shrink: 0;
    }

    .location-tag {
      display: inline-block;
      background-color: #D30909;
      color: #FFF0C3;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
    }

    h1 {
      font-family: Impact, 'Arial Narrow', 'Franklin Gothic Medium', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #1a1a1a;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .optional {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      margin-left: 4px;
    }

    .star-row {
      display: flex;
      flex-direction: row-reverse;
      justify-content: center;
      gap: 6px;
    }

    .star-row input[type="radio"] {
      display: none;
    }

    .star-row label {
      font-size: 40px;
      cursor: pointer;
      color: #e0e0e0;
      transition: color 0.15s ease;
      margin-bottom: 0;
      font-weight: normal;
      text-transform: none;
      letter-spacing: 0;
    }

    .star-row label:hover,
    .star-row label:hover ~ label {
      color: #FFB636;
    }

    .star-row input[type="radio"]:checked ~ label {
      color: #FFB636;
    }

    textarea {
      width: 100%;
      padding: 14px;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      font-size: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color 0.15s ease;
      background-color: #fafafa;
    }

    textarea:focus {
      border-color: #FFB636;
      background-color: #fff;
    }

    input[type="email"] {
      width: 100%;
      padding: 14px;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      font-size: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s ease;
      background-color: #fafafa;
    }

    input[type="email"]:focus {
      border-color: #FFB636;
      background-color: #fff;
    }

    .btn-submit {
      display: block;
      width: 100%;
      padding: 18px 24px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background-color: #FFB636;
      color: #1a1a1a;
      margin-top: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      letter-spacing: 0.02em;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .btn-submit:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      font-size: 12px;
      color: #D30909;
      margin-top: 6px;
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <img src="/logo.png" alt="SpudBros Express" class="logo" />
      <div class="location-tag">Liverpool</div>
    </div>
    <h1>Your feedback matters</h1>
    <p class="subtitle">Tell us what happened. It goes straight to our team.</p>

    <form id="feedbackForm">
      <div class="field">
        <label>How would you rate your visit?</label>
        <div class="star-row">
          <input type="radio" name="rating" id="star5" value="5" />
          <label for="star5">★</label>
          <input type="radio" name="rating" id="star4" value="4" />
          <label for="star4">★</label>
          <input type="radio" name="rating" id="star3" value="3" />
          <label for="star3">★</label>
          <input type="radio" name="rating" id="star2" value="2" />
          <label for="star2">★</label>
          <input type="radio" name="rating" id="star1" value="1" />
          <label for="star1">★</label>
        </div>
        <div class="error-msg" id="ratingError">Please select a star rating.</div>
      </div>

      <div class="field">
        <label for="description">What could we have done better?</label>
        <textarea id="description" name="description" placeholder="Tell us about your experience..."></textarea>
        <div class="error-msg" id="descriptionError">Please enter some feedback.</div>
      </div>

      <div class="field">
        <label for="email">Your email <span class="optional">(optional)</span></label>
        <input type="email" id="email" name="email" placeholder="you@example.com" />
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Send Feedback</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const rating = form.querySelector('input[name="rating"]:checked');
      const description = document.getElementById('description').value.trim();
      const email = document.getElementById('email').value.trim();

      const ratingError = document.getElementById('ratingError');
      const descriptionError = document.getElementById('descriptionError');

      ratingError.style.display = 'none';
      descriptionError.style.display = 'none';

      let valid = true;

      if (!rating) {
        ratingError.style.display = 'block';
        valid = false;
      }

      if (!description) {
        descriptionError.style.display = 'block';
        valid = false;
      }

      if (!valid) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const response = await fetch('/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            location_id: 'liverpool',
            star_rating: parseInt(rating.value),
            description: description,
            customer_email: email || null,
          }),
        });

        if (response.ok) {
          window.location.href = '/thankyou';
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send Feedback';
          alert('Something went wrong. Please try again.');
        }
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Feedback';
        alert('Something went wrong. Please try again.');
      }
    });
  </script>
</body>
</html>
