<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpudBros Express Liverpool</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #D30909;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 28px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo {
      width: 72px;
      height: auto;
      flex-shrink: 0;
    }

    .location-tag {
      display: inline-block;
      background-color: #D30909;
      color: #FFF0C3;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
    }

    h1 {
      font-family: Impact, 'Arial Narrow', 'Franklin Gothic Medium', sans-serif;
      font-size: 38px;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px 24px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity 0.15s ease, transform 0.15s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      letter-spacing: 0.02em;
    }

    .btn:last-of-type {
      margin-bottom: 0;
    }

    .btn:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    .btn-positive {
      background-color: #FFB636;
      color: #1a1a1a;
    }

    .btn-negative {
      background-color: #F0EEEA;
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <img src="/logo.png" alt="SpudBros Express" class="logo" />
      <div class="location-tag">Liverpool</div>
    </div>
    <h1>How was your spud?</h1>
    <p class="subtitle">Takes 30 seconds. Means a lot to us.</p>

    <a href="https://search.google.com/local/writereview?placeid=ChIJm12eVwAhe0gRp2x6s1mjoxs" class="btn btn-positive" target="_blank" rel="noopener">
      It was great!
    </a>

    <a href="/feedback/liverpool" class="btn btn-negative">
      Could be better
    </a>
  </div>
  <script>
    function trackEvent(event, properties = {}) {
      fetch('/api/event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event,
          properties,
          user_agent: navigator.userAgent,
          referrer: document.referrer
        })
      }).catch(() => {});
    }

    trackEvent('page_load', { location_id: 'liverpool' });

    document.querySelector('.btn-positive').addEventListener('click', function() {
      trackEvent('button_click', { location_id: 'liverpool', button: 'positive' });
    });

    document.querySelector('.btn-negative').addEventListener('click', function() {
      trackEvent('button_click', { location_id: 'liverpool', button: 'negative' });
    });
  </script>
</body>
</html>
